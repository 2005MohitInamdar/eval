<div>
    <form [formGroup]="authService.authForm" (ngSubmit)="authService.submit()">
        <div class="space-y-8">

            <!-- Name field (SignUp only) -->
            @if (authService.auth_page === "SignUp" && authService.authForm.contains("name")){
                <div class="group">
                    <label class="block text-[9px] tracking-[0.4em] text-slate-500 uppercase mb-2 group-focus-within:text-cyan-400 transition-colors">
                        AGENT NAME
                    </label>
                    <div class="relative">
                        <input 
                            type="text" 
                            formControlName="name"
                            placeholder="Enter callsign"
                            class="w-full bg-transparent border-0 border-b-2 border-slate-700 focus:border-cyan-400 outline-none py-3 text-white placeholder-slate-600 text-sm tracking-wider transition-colors duration-300"
                        />
                        <div class="absolute bottom-0 left-0 w-0 h-[2px] bg-cyan-400 group-focus-within:w-full transition-all duration-500"></div>
                    </div>
                </div>
            }

            <!-- Email field -->
            <div class="group">
                <label class="block text-[9px] tracking-[0.4em] text-slate-300 uppercase mb-2 group-focus-within:text-cyan-400 transition-colors">
                    IDENTIFIER
                </label>
                <div class="relative">
                    <input 
                        type="email" 
                        formControlName="email"
                        placeholder="agent@eval.io"
                        class="w-full bg-transparent border-0 border-b-2 border-slate-700 focus:border-cyan-400 outline-none py-3 text-white placeholder-slate-600 text-sm tracking-wider transition-colors duration-300"
                    />
                    <div class="absolute bottom-0 left-0 w-0 h-[2px] bg-cyan-400 group-focus-within:w-full transition-all duration-500"></div>
                </div>
            </div>

            <!-- Password field -->
            <div class="group">
                <label class="block text-[9px] tracking-[0.4em] text-slate-200 uppercase mb-2 group-focus-within:text-cyan-400 transition-colors">
                    ACCESS KEY
                </label>
                <div class="relative">
                    <input 
                        type="password" 
                        formControlName="password"
                        placeholder="••••••••••••"
                        class="w-full bg-transparent border-0 border-b-2 border-slate-700 focus:border-cyan-400 outline-none py-3 text-white placeholder-slate-600 text-sm tracking-wider transition-colors duration-300"
                    />
                    <div class="absolute bottom-0 left-0 w-0 h-[2px] bg-cyan-400 group-focus-within:w-full transition-all duration-500"></div>
                </div>
            </div>

            <!-- Submit button slot -->
            <ng-content></ng-content>

            <!-- Divider -->
            <div class="flex items-center gap-4">
                <div class="flex-1 h-px bg-slate-800"></div>
                <span class="text-[9px] tracking-widest text-slate-600 uppercase">or</span>
                <div class="flex-1 h-px bg-slate-800"></div>
            </div>

            <!-- Google Sign In -->
            <button 
                type="button"
                class="group w-full flex items-center justify-between border border-slate-700 hover:border-cyan-400/50 px-6 py-3.5 text-slate-400 hover:text-white transition-all duration-300 text-xs uppercase tracking-widest"
            >
                <div class="flex items-center gap-4">
                    <!-- Google icon -->
                    <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    <span>Continue with Google</span>
                </div>
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
                    class="w-3 h-3 opacity-0 group-hover:opacity-100 transition-all duration-300 group-hover:translate-x-1">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
                </svg>
            </button>

        </div>
    </form>
</div>
