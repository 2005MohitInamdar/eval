<div class="h-screen">
    <form>
        <div class="h-screen flex justify-center items-center flex-col">
            <label for="">Type of interview</label>
            <div class="mt-5 ">
                <button type="button" class="border border-solid cursor-pointer mx-5" (click)="interviewType('Technical Interview')">Technical Interview</button>
                <button type="button" class="border border-solid cursor-pointer mx-5" (click)="interviewType('Behavioral Interview')">Behavioral Interview</button>
                <button type="button" class="border border-solid cursor-pointer mx-5" (click)="interviewType('Combined')">Combined</button>
            </div>
            <div>
                <input type="text" placeholder="User Input" class="border border-solid mt-10" placeholder="Interview for role?" [formControl]="interview_role">
            </div>
            <button type="button" (click)="start_interview()" class="border border-solid mt-10">start</button >
        </div>
    </form>
</div>
