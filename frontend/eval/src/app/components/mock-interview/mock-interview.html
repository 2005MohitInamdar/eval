<div>
    <div class="border px-10 py-5 mx-5 my-10">
        @if(first_question){
            <h1>{{first_question}}</h1>
        }
        
        @else if(new_question){
            <h1>{{new_question}}</h1>
        }
    </div>
    <div>
        <form>
            <div>
                <textarea
                    class="border w-screen"
                    placeholder="Enter your asnwer here"
                    rows="4"
                    [formControl]="user_answer"></textarea>
                <button type="button" class="border px-5 py-3" (click)="submit()">Next -></button>
            </div>
        </form>
    </div>
</div>
