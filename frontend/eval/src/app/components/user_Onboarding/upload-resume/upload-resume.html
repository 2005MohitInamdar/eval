<div class="h-screen bg-black text-white">
    <app-nav-top></app-nav-top>
    <div>
        <h1>Upload resume</h1>
        <input type="file" hidden class="border border-white px-3 py-1" (change)="onFileSelected($event)" #fileInput >

        <div appDragnDrop (click)="fileInput.click()" class="border border-white px-5 py-2.5" (filesDropped)="handleDroppedFiles($event)">
            <p>{{fileName || "No File Selected"}}</p>
            <button type="button"  class="border border-white px-2 py-1">Upload</button>
        </div>
        <button (click)="submitResume()" class="border border-white px-5 py-2 mt-5">Next</button>
    </div>
</div>
